<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальный Вайб | r9t1</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* Общие стили */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1e2e, #09090b);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Шапка */
        header {
            text-align: center;
            padding: 60px 20px 40px;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(90deg, #ff4d4d, #f9cb28);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        p {
            color: #a1a1aa;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        /* Контейнер для плеера */
        .player-container {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .player-container:hover {
            transform: translateY(-5px);
        }

        iframe {
            border-radius: 12px;
            max-width: 100%;
        }

        /* Футер */
        footer {
            margin-top: auto;
            padding: 40px 20px;
            font-size: 0.9rem;
            color: #52525b;
        }

        /* Декоративный элемент */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: #ff4d4d;
            filter: blur(150px);
            opacity: 0.15;
            z-index: -1;
            top: 20%;
        }

        /* Адаптивность для мобилок */
        @media (max-width: 650px) {
            h1 { font-size: 2rem; }
            .player-container { width: 90%; padding: 10px; }
            iframe { width: 100% !important; height: 500px !important; }
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <header>
        <h1>r9t1</h1>
        <p>Куратор плейлиста: <strong>nur8eku</strong></p>
    </header>

    <main class="player-container">
        <iframe frameborder="0" allow="clipboard-write" style="border:none;width:614px;height:556px;" width="614" height="556" src="https://music.yandex.kz/iframe/playlist/nur8eku/1000"></iframe>
    </main>

    <footer>
        &copy; 2026 Сделано для ценителей звука
    </footer>

</body>
</html>
